apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: node-mongo-app
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: #{ACR_LOGIN_SERVER}#/node-mongo-backend:#{IMAGE_TAG}#
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: mongodb-uri
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"

        # Si luego activas JWT:
        # - name: JWT_SECRET
        #   valueFrom:
        #     secretKeyRef:
        #       name: app-secret
        #       key: jwt-secret

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: node-mongo-app
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP