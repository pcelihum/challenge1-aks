services:
  mongo:
    image: mongo:7
    container_name: mongo_challenge_1
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend/express-back
    container_name: backend
    environment:
      PORT: "3000"
      MONGO_URI: "mongodb://mongo:27017/challenge"
    depends_on:
      - mongo
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend/node-front
      args:
        VITE_API_URL: "http://backend:3000"
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data: